<div
  class="series-progress-outer"
  [class.series-progress-outer--embedded]="embedded()"
>
  <div
    class="series-progress"
    [class.series-progress--embedded]="embedded()"
    role="region"
    [attr.aria-label]="progressAria()"
  >
    <div class="series-progress__row">
      <span class="series-progress__tick" aria-hidden="true">0</span>
      <div class="series-progress__bar-host">
        <div class="series-progress__bar-bg" aria-hidden="true">
          <div class="series-progress__bar-fill" [style.width.%]="winsFillPercent()"></div>
        </div>
      </div>
      <div class="series-progress__endcap">
        <span class="series-progress__tick" aria-hidden="true">10</span>
        <div class="series-progress__strikes" aria-hidden="true">
          @for (i of strikeIndices; track i) {
            <span
              class="series-progress__strike-chip"
              [class.series-progress__strike-chip--on]="strikeLit(i)"
            >
              <span class="series-progress__strike">×</span>
            </span>
          }
        </div>
      </div>
    </div>
  </div>
</div>
