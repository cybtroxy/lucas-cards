<div class="series-progress" aria-label="Progreso de la serie">
  <div class="series-progress__track">
    @for (idx of indices(); track idx) {
      @if (idx > 0) {
        <div class="series-progress__connector" [class.series-progress__connector--ahead]="lineTint(idx - 1) === 'ahead'"></div>
      }
      <div
        class="series-progress__chip"
        [class.series-progress__chip--current]="idx === currentPartidaIndex()"
        [attr.data-state]="chipState(idx)"
        [attr.aria-current]="idx === currentPartidaIndex() ? 'step' : null"
        [title]="
          chipState(idx) === 'win'
            ? 'Ganada'
            : chipState(idx) === 'loss'
              ? 'Perdida'
              : chipState(idx) === 'draw'
                ? 'Empate'
                : 'Pendiente'
        "
      >
        <span class="series-progress__num">{{ idx + 1 }}</span>
      </div>
    }
  </div>
</div>
